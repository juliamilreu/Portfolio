# --- Autenticação DecapBridge (PKCE) ---
backend:
  name: git-gateway
  repo: juliamilreu/Portfolio
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b94fa911-34da-4269-a6a4-421344d1f18f/pkce
  auth_token_endpoint: /sites/b94fa911-34da-4269-a6a4-421344d1f18f/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://resonant-sawine-be15b6.netlify.app

# Idioma do painel
locale: pt

media_folder: "uploads"        # onde imagens enviadas ficam salvas
public_folder: "/uploads"

collections:
  # --- Projetos do portfólio ---
  - name: "portfolio"
    label: "Portfólio"
    files:
      - name: "projects"
        label: "Projetos"
        file: "projects.json"
        description: "Adicione, edite, reordene ou remova os vídeos do portfólio."
        fields:
          - label: "Projetos"
            name: "projects"
            widget: "list"
            label_singular: "Projeto"
            summary: "{{fields.title}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "ID do vídeo no Vimeo", name: "vimeo", widget: "string", hint: "Só o número. Ex.: em vimeo.com/719671885 o ID é 719671885" }
              - { label: "Categoria", name: "category", widget: "select", required: false, options: ["Mobile Games", "Eventos", "Social"] }
              - { label: "Capa (URL da imagem)", name: "thumb", widget: "string", required: false, hint: "Deixe em branco para usar a capa automática do Vimeo" }

  # --- Textos do site ---
  - name: "config"
    label: "Configurações do site"
    files:
      - name: "site"
        label: "Textos e contato"
        file: "site.json"
        fields:
          - { label: "Nome", name: "name", widget: "string" }
          - { label: "Título (kicker)", name: "tagline", widget: "string" }
          - { label: "Texto do topo (hero)", name: "hero", widget: "text" }
          - { label: "Sobre", name: "about", widget: "text" }
          - { label: "E-mail", name: "email", widget: "string" }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Behance", name: "behance", widget: "string", required: false }
          - { label: "Dribbble", name: "dribbble", widget: "string", required: false }
