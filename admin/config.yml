# --- Autenticação DecapBridge (PKCE) ---
backend:
  name: git-gateway
  repo: juliamilreu/Portfolio
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b94fa911-34da-4269-a6a4-421344d1f18f/pkce
  auth_token_endpoint: /sites/b94fa911-34da-4269-a6a4-421344d1f18f/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://resonant-sawine-be15b6.netlify.app

locale: pt
media_folder: "uploads"
public_folder: "/uploads"

collections:
  # --- Projetos ---
  - name: "portfolio"
    label: "Portfólio"
    files:
      - name: "projects"
        label: "Projetos"
        file: "projects.json"
        description: "Cada item é um projeto. Marque 'Destaque na home' para ele aparecer na página inicial."
        fields:
          - label: "Projetos"
            name: "projects"
            widget: "list"
            label_singular: "Projeto"
            summary: "{{fields.title}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Identificador (slug)", name: "slug", widget: "string", hint: "Usado no link da página do projeto. Use letras minúsculas e hifens. Ex.: stop-word-duel" }
              - { label: "ID do vídeo no Vimeo", name: "vimeo", widget: "string", hint: "Só o número. Ex.: em vimeo.com/719671885 o ID é 719671885" }
              - { label: "Vídeo de preview (upload, 2-3s)", name: "previewFile", widget: "file", required: false, hint: "Clipe curto (mp4/webm) só para o card. Recomendado: já cortado quadrado. Crop perfeito em qualquer proporção e o 1º frame vira a capa. Tem prioridade sobre os campos abaixo." }
              - { label: "Vídeo de preview (ID do Vimeo, alternativa)", name: "previewVimeo", widget: "string", required: false, hint: "Use outro vídeo do Vimeo só para o preview do card (em vez do vídeo principal). Funciona melhor com vídeos 16:9." }
              - { label: "Início do preview (segundos)", name: "previewStart", widget: "number", required: false, default: 0, value_type: "float", min: 0, step: 0.1, hint: "Só vale para preview do Vimeo. Onde o loop começa. Use ponto para decimais (ex.: 3.2). O loop dura ~2,4s." }
              - { label: "Categoria", name: "category", widget: "select", options: ["Motion", "Video Edition", "Graphic Design"] }
              - { label: "Destaque na home (featured)", name: "featured", widget: "boolean", default: false, hint: "Ligado = aparece na página inicial (até 6). Sempre aparece na página WORK." }
              - { label: "Capa (URL da imagem)", name: "thumb", widget: "string", required: false, hint: "Deixe em branco para usar a capa automática do Vimeo." }
              - label: "Página do projeto (blocos)"
                name: "blocks"
                widget: "list"
                required: false
                label_singular: "Bloco"
                summary: "{{fields.type}}"
                hint: "Monte a página do projeto na ordem que quiser. Adicione blocos e arraste para reordenar."
                types:
                  - label: "Cabeçalho"
                    name: "header"
                    widget: object
                    fields:
                      - { label: "Título principal", name: "title", widget: "string" }
                      - { label: "Subtítulo", name: "subtitle", widget: "string", required: false }
                      - { label: "Citação / about do cliente", name: "clientQuote", widget: "text", required: false }
                      - { label: "Cliente", name: "client", widget: "string", required: false }
                  - label: "Título de seção"
                    name: "heading"
                    widget: object
                    fields:
                      - { label: "Texto", name: "text", widget: "string" }
                  - label: "Divisor (linha)"
                    name: "divider"
                    widget: object
                    fields:
                      - { label: "Largura", name: "width", widget: "select", options: ["curta", "total"], default: "curta", required: false }
                  - label: "Texto"
                    name: "text"
                    widget: object
                    fields:
                      - { label: "Conteúdo", name: "body", widget: "markdown" }
                  - label: "Texto + mídia (lado a lado)"
                    name: "text_media"
                    widget: object
                    fields:
                      - { label: "Texto", name: "body", widget: "markdown" }
                      - { label: "Lado da mídia", name: "side", widget: "select", options: ["direita", "esquerda"], default: "direita" }
                      - { label: "Tipo de mídia", name: "mediaType", widget: "select", options: ["video", "imagem"], default: "video" }
                      - { label: "ID do vídeo (Vimeo)", name: "vimeo", widget: "string", required: false }
                      - { label: "Vídeo mudo em loop (estilo gif)", name: "gif", widget: "boolean", default: true, required: false }
                      - { label: "Imagem", name: "image", widget: "image", required: false }
                  - label: "Vídeo (largura total)"
                    name: "video"
                    widget: object
                    fields:
                      - { label: "ID do vídeo (Vimeo)", name: "vimeo", widget: "string" }
                      - { label: "Mudo em loop (estilo gif)", name: "gif", widget: "boolean", default: false, required: false }
                  - label: "Galeria (vídeos/imagens lado a lado)"
                    name: "gallery"
                    widget: object
                    fields:
                      - { label: "Colunas", name: "columns", widget: "number", default: 3, min: 1, max: 4, value_type: "int" }
                      - label: "Itens"
                        name: "items"
                        widget: "list"
                        label_singular: "Item"
                        fields:
                          - { label: "Título (opcional)", name: "title", widget: "string", required: false }
                          - { label: "Tipo", name: "mediaType", widget: "select", options: ["video", "imagem"], default: "video" }
                          - { label: "ID do vídeo (Vimeo)", name: "vimeo", widget: "string", required: false }
                          - { label: "Imagem / GIF", name: "image", widget: "image", required: false }
                  - label: "Imagem"
                    name: "image"
                    widget: object
                    fields:
                      - { label: "Imagem", name: "image", widget: "image" }
                      - { label: "Largura total", name: "full", widget: "boolean", default: false, required: false }

  # --- Textos do site ---
  - name: "config"
    label: "Configurações do site"
    files:
      - name: "site"
        label: "Textos e contato"
        file: "site.json"
        fields:
          - { label: "Nome", name: "name", widget: "string" }
          - { label: "Logo (imagem do nome)", name: "logo", widget: "image", required: false, hint: "Suba o logo do seu nome (SVG ou PNG transparente). Substitui o nome em texto no topo. Vazio = usa o texto." }
          - { label: "Logo do rodapé", name: "footerLogo", widget: "image", required: false, hint: "Logo que aparece no rodapé, acima do e-mail. Use uma versão clara/branca (o fundo do rodapé é coral). Vazio = usa o nome em texto." }
          - { label: "Saudação (ex.: HI!)", name: "heroGreeting", widget: "string" }
          - { label: "Texto de apresentação", name: "hero", widget: "text" }
          - { label: "Frase em destaque", name: "heroEmphasis", widget: "string" }
          - { label: "Vídeo Reel (ID do Vimeo)", name: "reel", widget: "string", required: false, hint: "ID do vídeo principal (motion reel) que aparece no topo da home. Ex.: em vimeo.com/1117223701 o ID é 1117223701." }
          - { label: "Capa do Reel (imagem)", name: "reelCover", widget: "image", required: false, hint: "Imagem de capa do reel (aparece antes de dar play, no lugar da barra do Vimeo). Vazio = usa a capa automática do Vimeo." }
          - { label: "Foto da página About", name: "aboutPhoto", widget: "image", required: false, hint: "Sua foto que aparece ao lado do texto na página About." }
          - { label: "Sobre (página About)", name: "about", widget: "text", hint: "Separe os parágrafos com uma linha em branco." }
          - { label: "E-mail", name: "email", widget: "string" }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Behance", name: "behance", widget: "string", required: false }
          - { label: "Dribbble", name: "dribbble", widget: "string", required: false }
